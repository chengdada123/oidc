{{ define "base" }}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f5f7fb;color:#111827}
    .wrap{max-width:960px;margin:40px auto;padding:0 20px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#111827;text-decoration:none;cursor:pointer}
    .btn-primary{background:#111827;color:#fff;border-color:#111827}
    .btn-danger{background:#b91c1c;color:#fff;border-color:#b91c1c}
    .btn-sm{padding:6px 10px;font-size:14px}
    .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top;white-space:nowrap}
    code{white-space:nowrap}
    input,select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .muted{color:#6b7280}
    .error{color:#b91c1c;margin:10px 0}
    .actions{display:flex;gap:8px;flex-wrap:nowrap;white-space:nowrap;align-items:center}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px}
    @media (max-width:640px){.wrap{margin:18px auto;padding:0 10px}.card{padding:14px;border-radius:10px}.topbar{align-items:flex-start;flex-direction:column}.btn{width:auto}.actions{gap:6px;flex-wrap:nowrap}.grid{grid-template-columns:1fr}table{font-size:14px;min-width:980px}th,td{padding:8px}.card h1{font-size:24px}.card h2{font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    {{ template "content" . }}
  </div>
</body>
</html>
{{ end }}
