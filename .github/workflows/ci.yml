name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t oidc-bridge:ci .

      - name: Prepare env file
        run: |
          cp .env.example .env
          sed -i 's#^BASE_URL=.*#BASE_URL=http://127.0.0.1:8080#' .env
          sed -i 's#^SESSION_SECRET=.*#SESSION_SECRET=ci-session-secret#' .env
          sed -i 's#^ADMIN_PASSWORD=.*#ADMIN_PASSWORD=ci-admin-password#' .env
          sed -i 's#^VPS8_OIDC_ISSUER=.*#VPS8_OIDC_ISSUER=https://vps8.example.invalid/oidc#' .env
          sed -i 's#^VPS8_OIDC_CLIENT_ID=.*#VPS8_OIDC_CLIENT_ID=ci-vps8-client-id#' .env
          sed -i 's#^VPS8_OIDC_CLIENT_SECRET=.*#VPS8_OIDC_CLIENT_SECRET=ci-vps8-client-secret#' .env

      - name: Run container
        run: |
          mkdir -p data
          docker run -d --name oidc-bridge-ci --env-file .env -p 8080:8080 -v "$PWD/data:/app/data" oidc-bridge:ci

      - name: Wait for service
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs oidc-bridge-ci
          exit 1

      - name: Smoke test discovery
        run: curl -fsS http://127.0.0.1:8080/.well-known/openid-configuration

      - name: Smoke test admin login
        run: |
          curl -fsS -c cookies.txt -b cookies.txt -L \
            -X POST \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data 'password=ci-admin-password' \
            http://127.0.0.1:8080/admin/login > admin.html
          grep -q '管理后台' admin.html

      - name: Smoke test OIDC start route
        run: |
          headers=$(mktemp)
          curl -sS -D "$headers" -o /dev/null http://127.0.0.1:8080/oidc/start || true
          grep -E 'HTTP/1\.[01] 302' "$headers"

      - name: Show logs on failure
        if: failure()
        run: docker logs oidc-bridge-ci

      - name: Cleanup
        if: always()
        run: docker rm -f oidc-bridge-ci || true
